# Configuration for SonarCloud Automatic Analysis.
# Automatic Analysis ignores sonar-project.properties; only this file (and the
# project UI) are honored. See:
# https://docs.sonarsource.com/sonarqube-cloud/analyzing-source-code/automatic-analysis

# The TextMate bundle is a vendored VSCode-style grammar package
# (package.json + *.tmLanguage.json), not an npm project, so text:S8564
# (missing lock file) does not apply to it.
sonar.exclusions=**/vendor/**, **/gen/**, **/textmate/**
