name: Release

on:
  release:
    types:
      - prereleased
      - released

jobs:
  publish:
    name: Publish to JetBrains Marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # git-versioning резолвит версию по тегам/истории; shallow-клон ломает describe.
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # publishPlugin собирает плагин (buildSearchableOptions → headless-IDE), которой нужен
      # доступ к Secret Service; иначе — D-Bus/libsecret WARN. Ставим keyring-стек и гоняем
      # publish под сессией D-Bus с разблокированным gnome-keyring.
      - name: Install headless keyring
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0 gnome-keyring dbus-x11

      - name: Publish plugin
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
          CERTIFICATE_CHAIN: ${{ secrets.CERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
        run: |
          dbus-run-session -- bash -c '
            gnome-keyring-daemon --components=secrets --daemonize --unlock <<< ""
            ./gradlew publishPlugin --stacktrace
          '
