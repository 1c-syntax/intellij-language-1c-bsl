name: Build

on:
  push:
    branches:
      - master
      - develop
  pull_request:

jobs:
  build:
    name: Build & verify plugin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # git-versioning резолвит версию по тегам/истории; shallow-клон ломает describe.
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # buildSearchableOptions поднимает headless-IDE, которая при старте ходит в системное
      # хранилище паролей (PasswordSafe → Secret Service). Ставим keyring-стек и гоняем сборку
      # под сессией D-Bus с разблокированным gnome-keyring, иначе сыплются D-Bus/libsecret WARN.
      - name: Install headless keyring
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0 gnome-keyring dbus-x11

      - name: Build plugin
        run: |
          dbus-run-session -- bash -c '
            gnome-keyring-daemon --components=secrets --daemonize --unlock <<< ""
            ./gradlew buildPlugin --stacktrace
          '

      # Платформенные тесты (BasePlatformTestCase) поднимают headless-IDE — как и buildPlugin,
      # гоним их под сессией D-Bus с разблокированным gnome-keyring.
      - name: Test
        run: |
          dbus-run-session -- bash -c '
            gnome-keyring-daemon --components=secrets --daemonize --unlock <<< ""
            ./gradlew test --stacktrace
          '

      - name: Verify plugin
        run: ./gradlew verifyPlugin --stacktrace

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-distribution
          path: build/distributions/*.zip
